<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;

  /* animated gradient */
  background: linear-gradient(-45deg, #0f172a, #1e40af, #7c3aed, #06b6d4);
  background-size: 400% 400%;
  animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* ================= MAIN CARD ================= */
.login-card {
  width: 950px;
  max-width: 95%;
  display: flex;
  border-radius: 25px;
  overflow: hidden;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);

  box-shadow: 0 25px 80px rgba(0,0,0,0.5);
}

/* ================= LEFT PANEL ================= */
.left {
  flex: 1;
  padding: 60px;
  color: white;
  background: rgba(0,0,0,0.25);
}

.left h1 {
  font-size: 42px;
  font-weight: 900;
}

.left p {
  margin-top: 15px;
  opacity: 0.85;
  line-height: 1.6;
}

/* glowing dots decoration */
.glow {
  width: 10px;
  height: 10px;
  background: #60a5fa;
  border-radius: 50%;
  display: inline-block;
  margin-right: 5px;
  box-shadow: 0 0 15px #60a5fa;
}

/* ================= RIGHT PANEL ================= */
.right {
  flex: 1;
  padding: 60px;
}

/* LOGIN BOX */
.login-box {
  background: rgba(255,255,255,0.12);
  padding: 35px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
}

.login-box h2 {
  color: white;
  font-weight: 800;
  margin-bottom: 25px;
}

/* INPUTS */
.form-control {
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 15px;
}

.form-control::placeholder {
  color: #e5e7eb;
}

.form-control:focus {
  box-shadow: 0 0 15px #38bdf8;
  background: rgba(255,255,255,0.2);
}

/* BUTTON */
.btn-login {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  color: white;

  background: linear-gradient(90deg,#3b82f6,#a855f7,#06b6d4);
  background-size: 200% 200%;
  transition: 0.4s;
}

.btn-login:hover {
  background-position: right;
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(59,130,246,0.6);
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {
  .login-card {
    flex-direction: column;
  }

  .left {
    text-align: center;
    padding: 30px;
  }

  .right {
    padding: 30px;
  }
}

</style>
</head>

<body>

<div class="login-card">

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>🎓 LMS Portal</h1>

    <p>
      <span class="glow"></span> Secure University System<br>
      <span class="glow"></span> Students Dashboard<br>
      <span class="glow"></span> Teacher & Admin Panel<br>
      <span class="glow"></span> Real-time LMS Analytics
    </p>

    <p style="margin-top:20px; font-size:14px; opacity:0.7;">
      Login once → access everything instantly 🚀
    </p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <div class="login-box">
      <h2>Login to LMS</h2>

      <form method="post">

        <input type="email" name="email" class="form-control" placeholder="Enter Email">

        <input type="password" name="password" class="form-control" placeholder="Enter Password">

        <button class="btn-login">🚀 Access Dashboard</button>

      </form>

    </div>

  </div>

</div>

</body>
</html>
